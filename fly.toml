# fly.toml app configuration file generated for personal-ai-backend on 2026-04-26T16:12:52Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'personal-ai-backend'
primary_region = 'nrt'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
